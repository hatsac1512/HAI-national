  const c = CONDITIONS[qId];
  if (!c) return true;
  const v = fd[c.dep] || "";

  if (c.vals) return c.vals.includes(v);
  return true;
}

const allQs = STEPS.flatMap(s => s.questions);

function exportCSV(responses) {
  const h = ["#", "Timestamp", ...allQs.map(q => `Q${q.num}`)];
  const esc = v => { const s = String(v||""); return s.includes(",")||s.includes('"')||s.includes("\n") ? `"${s.replace(/"/g,'""')}"` : s; };
  const rows = responses.map((r,i) => [i+1, r.ts, ...allQs.map(q => esc(r.a[q.id]||""))].join(","));
  const csv = "\uFEFF" + [h.map(esc).join(","), ...rows].join("\n");
  const b = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(b);
  a.download = `HAI_National_${new Date().toISOString().slice(0,10)}.csv`; a.click();
}

const SCRIPT = `function doPost(e) {
  var sh = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
  var d = JSON.parse(e.postData.contents);
  if (sh.getLastRow() === 0) { sh.appendRow([...Object.keys(d), "Timestamp"]); }
  var h = sh.getRange(1,1,1,sh.getLastColumn()).getValues()[0];
  sh.appendRow(h.map(function(k){ return k==="Timestamp"? new Date().toLocaleString() : d[k]||""; }));
  return ContentService.createTextOutput(JSON.stringify({ok:1})).setMimeType(ContentService.MimeType.JSON);
}`;

.cb{background:var(--bg);border:1px solid var(--g2);border-radius:var(--rs);padding:12px;font-family:monospace;font-size:10.5px;line-height:1.5;color:var(--t2);overflow-x:auto;white-space:pre;margin:8px 0}
.ur{display:flex;gap:8px}.ur .inp{flex:1}
.badge{display:inline-flex;padding:3px 10px;border-radius:16px;font-size:11px;font-weight:600;background:var(--bl);color:var(--bd);border:1px solid rgba(0,154,222,0.15)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 20px;background:var(--ok);color:#fff;border-radius:var(--r);font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:50;animation:pop .25s ease;white-space:nowrap}
.toast.w{background:var(--warn);color:var(--t)}
@keyframes pop{from{transform:translateX(-50%) translateY(10px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

/* Mode tabs */
.mtabs{display:flex;background:var(--w);border-bottom:1px solid var(--g2)}
.mtab{flex:1;padding:10px;border:none;background:0;font-family:var(--f);font-size:12.5px;font-weight:600;color:var(--t3);cursor:pointer;border-bottom:2.5px solid transparent;transition:.15s}
.mtab:hover{color:var(--t2)}
.mtab.active{color:var(--b);border-bottom-color:var(--b)}

/* Table */
.tw{overflow-x:auto;border:1px solid var(--g2);border-radius:var(--r);background:var(--w)}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:var(--blr);padding:8px;text-align:left;font-weight:700;color:var(--bdr);font-size:10px;text-transform:uppercase;border-bottom:2px solid var(--g2);white-space:nowrap}
td{padding:7px 8px;border-bottom:1px solid var(--g);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

@media(max-width:400px){
  .hdr h1{font-size:14px}
  .qlbl{font-size:13px}
  .ci{padding:10px 12px;font-size:12.5px}
}
`;

// ── MAIN APP ──
function App() {
  const [mode, setMode] = useState("form");
  const [step, setStep] = useState(0);
  const [fd, setFd] = useState({});
  const [res, setRes] = useState([]);
  const [toast, setToast] = useState(null);
  const [done, setDone] = useState(false);
  const [url, setUrl] = useState("");
  const [showIntro, setShowIntro] = useState(false);
  const contentRef = useRef(null);

  const show = (m, t="") => { setToast({m,t}); setTimeout(()=>setToast(null),2500); };

  const cur = STEPS[step];
  const visQs = cur ? cur.questions.filter(q => isVisible(q.id, fd)) : [];
  const visReq = visQs.filter(q => q.required);
  const visAns = visReq.filter(q => fd[q.id] && String(fd[q.id]).trim()).length;
  const stepDone = visReq.length === visAns;

  // Global progress
  const allVis = STEPS.flatMap(s => s.questions.filter(q => isVisible(q.id, fd)));
  const allVisReq = allVis.filter(q => q.required);
  const allVisAns = allVisReq.filter(q => fd[q.id] && String(fd[q.id]).trim()).length;
  const pct = allVisReq.length ? Math.round((allVisAns / allVisReq.length) * 100) : 0;

  const isStepComplete = (i) => {
    const s = STEPS[i];
    const vq = s.questions.filter(q => isVisible(q.id, fd));
    const vr = vq.filter(q => q.required);
    return vr.length > 0 && vr.every(q => fd[q.id] && String(fd[q.id]).trim());
  };

  const goStep = (i) => { setStep(i); contentRef.current?.scrollTo(0, 0); };
  const next = () => { if (step < STEPS.length - 1) goStep(step + 1); };
  const prev = () => { if (step > 0) goStep(step - 1); };

  const submit = async () => {
    const missing = allVisReq.find(q => !fd[q.id] || !String(fd[q.id]).trim());
    if (missing) { show(`⚠ Q${missing.num} required`, "w"); return; }
    const entry = { ts: new Date().toISOString().replace("T"," ").substring(0,19), a: { ...fd } };
    setRes(p => [...p, entry]);
    if (url) {
      try {
        const pl = {}; allQs.forEach(q => { pl[`Q${q.num}`] = fd[q.id] || ""; });
        await fetch(url, { method:"POST", mode:"no-cors", headers:{"Content-Type":"application/json"}, body:JSON.stringify(pl) });
        show("✓ Synced to Google Sheets!");
      } catch { show("✓ Saved locally"); }
    } else { show("✓ Submitted!"); }
    setFd({}); setDone(true); setStep(0);
  };

  const ri = q => {
    const v = fd[q.id] || "";
    const s = val => setFd(p => ({ ...p, [q.id]: val }));
    switch (q.type) {
      case "text": case "email": case "number":
        return <input className="inp" type={q.type} placeholder="Enter your answer" value={v} onChange={e=>s(e.target.value)} />;
      case "date":
        return <input className="inp" type="date" value={v} onChange={e=>s(e.target.value)} />;
      case "textarea":
        return <textarea className="inp ta" placeholder="Enter your answer" value={v} onChange={e=>s(e.target.value)} />;
      case "radio":
        return (<div className="cg">{(q.options||[]).map((o,i)=>(<label key={i} className={`ci ${v===o?"sel":""}`}><input type="radio" name={q.id} checked={v===o} onChange={()=>s(o)}/><span>{o}</span></label>))}</div>);
      case "checkbox": {
        const sel = v ? v.split("||").filter(Boolean) : [];
        return (<div className="cg">{(q.options||[]).map((o,i)=>(<label key={i} className={`ci ${sel.includes(o)?"sel":""}`}><input type="checkbox" checked={sel.includes(o)} onChange={e=>{const n=e.target.checked?[...sel,o]:sel.filter(x=>x!==o);s(n.join("||"));}}/><span>{o}</span></label>))}</div>);
      }
      default: return <input className="inp" value={v} onChange={e=>s(e.target.value)} />;
    }
  };

  return (<>
    <style>{CSS}</style>
    <div className="app">
      {/* Header */}
      <div className="hdr">
        <WHOLogo />
        <h1>Evaluation of Healthcare-Associated Infection Surveillance Programs</h1>
        <div className="hdr-sub">For National IPC Programme</div>
        <p>National Level • 124 Questions • ~30–45 min</p>
        <button className="intro-toggle" onClick={()=>setShowIntro(!showIntro)}>
          {showIntro ? "Hide" : "Read"} Introduction
          <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5" style={{transform:showIntro?"rotate(180deg)":"",transition:".2s"}}><path d="M6 9l6 6 6-6"/></svg>
        </button>
      </div>
      <div className={`intro-panel ${showIntro?"open":""}`}>
        <div className="intro-section">
          <h4><span className="inum">1</span> Introduction</h4>
          <p>This survey aims to collect data on the status of Healthcare-Associated Infection (HAI) surveillance programs at both national and facility levels within WHO Western Pacific Region (WPRO) Member States. It evaluates the integration of effective HAI surveillance as a core component of Infection Prevention and Control (IPC) programs, identifying critical areas for improvement and potential strategies to enhance implementation. The initiative, led by the WHO IPC, Maternal Child Health and Quality Safety (MCQ) unit, Division of Health Systems and Services (DHS), with support from WHO Country Offices, aligns with WHO's broader strategy to advance IPC program core components across Member States.</p>
          <p style={{marginTop:8}}>To achieve these objectives, tailored data collection tools will be developed to evaluate the current status of HAI surveillance systems. These tools are structured into eight sections, incorporating the six fundamental elements of HAI surveillance outlined in the WHO practical handbook. Each section provides a detailed description of activities and best practices related to Healthcare-Associated Infection (HAI) surveillance. These include governance, integration, regulation, and resource allocation; strategic planning for HAI surveillance; implementation and coverage at various levels; and processes for data collection. The sections also cover methods for data analysis, communication and feedback of surveillance data, techniques for interpreting the data, and approaches to monitoring and evaluating HAI surveillance systems.</p>
        </div>
        <div className="intro-divider"/>
        <div className="intro-section">
          <h4><span className="inum">2</span> Time Expectation</h4>
          <p>The survey will take approximately 30–45 minutes to complete. It consists of 124 questions, and we kindly request that you provide accurate and complete information where possible. If you do not have the information, please select <strong>"Don't know"</strong> or enter <strong>"DK"</strong> in the text fields.</p>
        </div>
        <div className="intro-divider"/>
        <div className="intro-section">
          <h4><span className="inum">3</span> Privacy Assurance</h4>
          <p>All personal information provided (e.g., respondent names, email addresses) will be de-identified and will only be used for data verification purposes. Official clearance from the Ministry of Health (MOH) is not required, as this is a preliminary exercise meant to support the validation process during the regional workshop. However, we ask that you make your best effort to accurately capture your country's progress, as this data will contribute to the development of your country's IPC action plan during the meeting.</p>
        </div>
        <div className="intro-divider"/>
        <div className="intro-section">
          <h4><span className="inum">4</span> Data Handling</h4>
          <p>Each participating national organization or health facility must assign a single focal point to enter data into the survey, ensuring consistency and preventing duplicate entries from multiple respondents within the same organization.</p>
          <p style={{marginTop:6}}>All data collected will be securely maintained by WHO and will be shared with Member States upon request.</p>
        </div>
        <div className="intro-divider"/>
        <div className="intro-section">
          <h4><span className="inum">5</span> Technical Queries</h4>
          <p>For any technical questions during the survey administration, please contact:<br/>
            <a href="mailto:liz@who.int">Dr. Zhao Li — liz@who.int</a><br/>
            <a href="mailto:vpham@who.int">Mr. Pham Van Hien — vpham@who.int</a>
          </p>
        </div>
      </div>

      {/* Mode tabs */}
      <div className="mtabs">
        <button className={`mtab ${mode==="form"?"active":""}`} onClick={()=>setMode("form")}>📝 Survey</button>
        <button className={`mtab ${mode==="data"?"active":""}`} onClick={()=>setMode("data")}>📊 Data ({res.length})</button>
        <button className={`mtab ${mode==="export"?"active":""}`} onClick={()=>setMode("export")}>⬇ Export</button>
      </div>

      {mode === "form" && !done && (<>
        {/* Progress */}
        <div className="tprog">
          <div className="tprog-bar"><div className={`tprog-fill ${pct===100?"done":""}`} style={{width:`${pct}%`}}/></div>
          <span className={`tprog-txt ${pct===100?"done":""}`}>{pct}%</span>
        </div>

        {/* Step dots */}
        <div className="dots">
          {STEPS.map((s,i) => (
            <div key={s.id} className="dot-wrap" onClick={()=>goStep(i)}>
              <div className={`dot ${i===step?"active":""}${isStepComplete(i)?" completed":""}`}>
                {isStepComplete(i) ? "✓" : i+1}
              </div>
            </div>
          ))}
        </div>

        {/* Content */}
        <div className="content" ref={contentRef}>
          <div className="step-title">
            <span className="icon">{cur.icon}</span>
            <div>
              <h2>{cur.title}</h2>
              <span className="count">Step {step+1} of {STEPS.length} • {visQs.length} questions</span>
            </div>
          </div>

          {visQs.map(q => {
            const isCond = !!CONDITIONS[q.id];
            return (
              <div key={q.id} className={`qcard ${isCond?"cond":""}`}>
                {q.note && <div className="note">{q.note}</div>}
                <div className="qlbl">
                  {q.num}. {q.label}
                  {q.required && <span className="req"> *</span>}
                </div>
                {ri(q)}
              </div>
            );
          })}
        </div>

        {/* Bottom bar */}
        <div className="bbar">
          {step > 0 && <button className="btn btn-o" onClick={prev}>← Back</button>}
          {step < STEPS.length - 1 ? (
            <button className="btn btn-p" onClick={next}>
              Next →
            </button>
          ) : (
            <button className="btn btn-ok" onClick={submit}>
              ✉ Submit
            </button>
          )}
        </div>
      </>)}

      {mode === "form" && done && (
        <div className="content">
          <div className="done-screen">
            <div className="check">✅</div>
            <h2>Thank You!</h2>
            <p>Your evaluation has been recorded successfully.</p>
            <button className="btn btn-p" onClick={()=>{setDone(false);setFd({});}}>Submit Another Response</button>
          </div>
        </div>
      )}

      {mode === "data" && (
        <div className="dtab">
          <div className="sg">
            <div className="sc"><div className="sv">{res.length}</div><div className="sl">Responses</div></div>
            <div className="sc"><div className="sv">124</div><div className="sl">Questions</div></div>
            <div className="sc"><div className="sv">{STEPS.length}</div><div className="sl">Sections</div></div>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <button className="btn btn-ok btn-sm" style={{flex:1}} onClick={()=>{if(!res.length){show("⚠ No data","w");return;}exportCSV(res);show("📥 Downloaded!");}}>⬇ Export CSV</button>
            {res.length>0 && <button className="btn btn-sm" style={{background:"var(--errb)",color:"var(--err)",border:"none"}} onClick={()=>{setRes([]);show("Cleared");}}>🗑</button>}
          </div>
          {res.length===0 ? (
            <div style={{textAlign:"center",padding:"40px 0",color:"var(--t3)"}}>
              <div style={{fontSize:32,opacity:.3,marginBottom:8}}>📭</div>
              <p style={{fontSize:13}}>No responses yet</p>
            </div>
          ) : (
            <div className="tw" style={{maxHeight:350,overflowY:"auto"}}>
              <table>
                <thead><tr><th>#</th><th>Time</th><th>Country</th><th>Name</th><th>Org</th></tr></thead>
                <tbody>{res.map((r,i)=>(<tr key={i}><td>{i+1}</td><td>{r.ts}</td><td>{r.a.q2||"—"}</td><td>{r.a.q4||"—"}</td><td>{r.a.q6||"—"}</td></tr>))}</tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {mode === "export" && (
        <div className="etab">
          <div className="ecard">
            <h3>⬇ Download CSV / Excel</h3>
            <p>Export all {res.length} responses as CSV file. Opens in Excel, Google Sheets, Numbers.</p>
            <button className="btn btn-ok" style={{width:"100%"}} onClick={()=>{if(!res.length){show("⚠ No data","w");return;}exportCSV(res);show("📥 Downloaded!");}}>⬇ Download CSV</button>
          </div>
          <div className="ecard">
            <h3>📊 Google Sheets Auto-Sync {url && <span className="badge" style={{marginLeft:6}}>✓</span>}</h3>
            <div className="gs"><div className="sn">1</div><div className="stc"><h4>Create Spreadsheet</h4><p>sheets.google.com → New</p></div></div>
            <div className="gs"><div className="sn">2</div><div className="stc"><h4>Apps Script</h4><p>Extensions → Apps Script</p></div></div>
            <div className="gs"><div className="sn">3</div><div className="stc"><h4>Paste code & Save</h4></div></div>
            <div className="cb">{SCRIPT}</div>
            <div className="gs"><div className="sn">4</div><div className="stc"><h4>Deploy</h4><ul><li>Deploy → Web app</li><li>Execute as: Me</li><li>Access: Anyone</li></ul></div></div>
            <div className="gs"><div className="sn">5</div><div className="stc"><h4>Paste URL below</h4></div></div>
            <div className="ur">
              <input className="inp" placeholder="https://script.google.com/..." value={url} onChange={e=>setUrl(e.target.value)} style={{fontSize:12.5}} />
              <button className="btn btn-p btn-sm" onClick={()=>{if(url.includes("script.google.com"))show("✓ Connected!");else show("⚠ Invalid","w");}}>Go</button>
            </div>
          </div>
        </div>
      )}

      {toast && <div className={`toast ${toast.t}`}>{toast.m}</div>}
    </div>
  </>);
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
